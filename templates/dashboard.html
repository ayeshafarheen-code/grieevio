<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – GRIEEVIO</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <div class="bg-effects">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/" class="navbar-brand"><span class="brand-icon">⚡</span> GRIEEVIO</a>
            <ul class="navbar-nav">
                <li><a href="/dashboard" class="nav-link active">Dashboard</a></li>
                <li><a href="/new-complaint" class="nav-link">New Complaint</a></li>
                <li><a href="/track" class="nav-link">Track</a></li>
                <li><a href="/profile" class="nav-link">Profile</a></li>
                <li><a href="#" class="nav-link" onclick="handleLogout()">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="page-container">
        <div class="page-header">
            <div>
                <h1>📋 My Complaints</h1>
                <p class="subtitle">Manage and track your submitted complaints</p>
            </div>
            <a href="/new-complaint" class="btn btn-primary">🆕 New Complaint</a>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon blue">📊</div>
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon yellow">📨</div>
                <div class="stat-value" id="stat-submitted">0</div>
                <div class="stat-label">Submitted</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon purple">🔄</div>
                <div class="stat-value" id="stat-progress">0</div>
                <div class="stat-label">In Progress</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green">✅</div>
                <div class="stat-value" id="stat-resolved">0</div>
                <div class="stat-label">Resolved</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon purple">🏆</div>
                <div class="stat-value" id="stat-points">0</div>
                <div class="stat-label">Civic Points</div>
                <div id="user-badge" class="badge-hero"></div>
            </div>
        </div>

        <!-- Complaints List -->
        <div class="complaints-section">
            <div class="complaints-header">
                <h2>Recent Complaints</h2>
                <div class="filter-group">
                    <button class="filter-btn active" onclick="filterComplaints('')">All</button>
                    <button class="filter-btn" onclick="filterComplaints('Submitted')">Submitted</button>
                    <button class="filter-btn" onclick="filterComplaints('In Progress')">In Progress</button>
                    <button class="filter-btn" onclick="filterComplaints('Resolved')">Resolved</button>
                </div>
            </div>
            <div id="complaints-list">
                <div style="text-align: center; padding: 3rem;">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>© 2026 <span class="footer-brand">GRIEEVIO</span></p>
    </footer>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/complaints.js"></script>
    <script>
        async function loadDashboardExtended() {
            try {
                // Fetch user data for points and badge
                const userRes = await fetch('/api/me');
                const userData = await userRes.json();
                const user = userData.user;
                
                document.getElementById('stat-points').innerText = user.points;
                const badgeEl = document.getElementById('user-badge');
                badgeEl.innerText = user.badge;
                badgeEl.className = 'badge-hero badge-' + user.badge.toLowerCase();

                // Call existing complaints loader
                if (typeof loadDashboard === 'function') loadDashboard();
            } catch (err) {
                console.error('Error loading dashboard:', err);
            }
        }
        document.addEventListener('DOMContentLoaded', loadDashboardExtended);
    </script>
</body>

</html>
