<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – GRIEEVIO</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="bg-effects">
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/" class="navbar-brand">⚡ GRIEEVIO</a>
            <ul class="navbar-nav">
                <li><a href="/" class="nav-link">Home</a></li>
                <li><a href="/login.html" class="nav-link">Login</a></li>
            </ul>
        </div>
    </nav>

    <main class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Join GRIEEVIO and help your community</p>
            </div>
            <form id="register-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="username">Full Name</label>
                    <input type="text" id="username" class="form-control" placeholder="John Doe" autocomplete="off" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="name@example.com" autocomplete="off" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" class="form-control" placeholder="+91 9876543210" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="language">Preferred Language</label>
                    <select id="language" class="form-control">
                        <option value="en">English</option>
                        <option value="hi">Hindi (हिन्दी)</option>
                        <option value="ta">Tamil (தமிழ்)</option>
                        <option value="te">Telugu (తెలుగు)</option>
                        <option value="bn">Bengali (বাংলা)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Register 🚀</button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="/login.html">Login here</a></p>
            </div>
        </div>
    </main>

    <script src="/static/js/app.js"></script>
</body>
</html>
