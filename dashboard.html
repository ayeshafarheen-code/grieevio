<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – GRIEEVIO</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="dashboard-body">
    <div class="bg-effects">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar glass">
        <div class="sidebar-header">
            <span class="brand-icon">⚡</span> GRIEEVIO
        </div>
        <nav class="sidebar-nav">
            <a href="/dashboard.html" class="nav-link active">🏠 Dashboard</a>
            <a href="/new-complaint.html" class="nav-link">🆕 New Complaint</a>
            <a href="/track.html" class="nav-link">📊 Track Status</a>
            <a href="/profile.html" class="nav-link">👤 My Profile</a>
        </nav>
        <div class="sidebar-footer">
            <button class="btn btn-sm btn-danger btn-block" onclick="handleLogout()">🚪 Logout</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="content-header">
            <div>
                <h1>Dashboard</h1>
                <p>Manage and track your civic complaints</p>
            </div>
            <div class="user-pill glass">
                <div class="user-avatar">👤</div>
                <span id="user-display-name">User</span>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <h4 id="stat-total">0</h4>
                <p>Total Filed</p>
            </div>
            <div class="stat-card">
                <h4 id="stat-submitted">0</h4>
                <p>Submitted</p>
            </div>
            <div class="stat-card">
                <h4 id="stat-progress">0</h4>
                <p>In Progress</p>
            </div>
            <div class="stat-card highlight">
                <h4 id="stat-resolved">0</h4>
                <p>Resolved</p>
            </div>
        </div>

        <!-- Complaints List -->
        <section class="complaints-section glass">
            <div class="section-title">
                <h2>My Complaints</h2>
                <div class="filter-group">
                    <button class="filter-btn active" onclick="filterComplaints('')">All</button>
                    <button class="filter-btn" onclick="filterComplaints('Submitted')">Submitted</button>
                    <button class="filter-btn" onclick="filterComplaints('In Progress')">Pending</button>
                    <button class="filter-btn" onclick="filterComplaints('Resolved')">Resolved</button>
                </div>
            </div>
            <div id="complaints-list" class="complaints-list">
                <!-- Loaded via JS -->
                <div class="loading">⏳ Loading your complaints...</div>
            </div>
        </section>
    </main>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/complaints.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                window.location.href = '/login.html';
                return;
            }
            document.getElementById('user-display-name').textContent = user.user_metadata?.username || user.email.split('@')[0];
            loadDashboard();
        });
    </script>
</body>
</html>
